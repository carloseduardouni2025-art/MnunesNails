<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Studio MNunesnails</title>
  <meta
    name="description"
    content="Acesse sua agenda no Studio MNunesnails."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">MN</div>
        <div>
          <p class="eyebrow">Studio MNunesnails</p>
          <h1>Acesso a agenda</h1>
        </div>
      </div>
      <nav class="top-actions" aria-label="Navegacao principal">
        <a class="ghost-button" href="index.html">Inicio</a>
        <a class="ghost-button" href="index.html#agendamento">Agendar</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-hero card">
        <span class="badge">Area segura</span>
        <h2>Entre para acompanhar seus horarios no Studio MNunesnails.</h2>
      </section>

      <section class="auth-grid">
        <form class="auth-card card" id="client-login-form">
          <div>
            <p class="eyebrow">Cliente</p>
            <h2>Entrar</h2>
          </div>

          <label>
            Celular
            <input type="tel" name="phone" placeholder="(11) 99999-9999" required>
          </label>

          <label>
            Senha
            <input type="password" name="password" placeholder="Sua senha" required>
          </label>

          <button class="primary-button" type="submit">Entrar</button>

          <p class="editor-feedback" id="client-login-feedback" role="status"></p>
        </form>

        <form class="auth-card card" id="client-register-form">
          <div>
            <p class="eyebrow">Cadastro</p>
            <h2>Criar acesso</h2>
          </div>

          <label>
            Nome
            <input type="text" name="name" placeholder="Seu nome completo" required>
          </label>

          <label>
            WhatsApp
            <input type="tel" name="whatsapp" placeholder="(11) 99999-9999" required>
          </label>

          <label>
            Senha
            <input type="password" name="password" placeholder="Crie uma senha" required>
          </label>

          <button class="primary-button" type="submit">Criar cadastro</button>
          <p class="editor-feedback" id="client-register-feedback" role="status"></p>
        </form>
      </section>
    </main>
  </div>

  <div class="toast" id="site-toast" role="status" aria-live="polite"></div>
  <script src="login.js"></script>
</body>
</html>
