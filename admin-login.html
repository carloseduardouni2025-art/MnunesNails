<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso administrativo | Studio MNunesnails</title>
  <meta
    name="description"
    content="Acesso restrito para administrar a agenda do Studio MNunesnails."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="auth-topbar auth-topbar-admin">
    <a class="auth-home-link" href="index.html" aria-label="Voltar para a página inicial">
      <span class="auth-home-mark">MN</span>
      <span>MNunesnails</span>
    </a>
  </header>

  <main class="auth-page auth-page-compact">
    <section class="auth-grid auth-grid-single">
      <form class="auth-card auth-card-compact auth-card-admin card" id="admin-login-form">
        <div class="auth-card-header">
          <span class="admin-auth-badge">Acesso restrito</span>
          <h1>Área administrativa</h1>
          <p>Entre para gerenciar horários, usuários e agendamentos.</p>
        </div>

        <div class="auth-divider"><span>admin</span></div>

        <label>
          Celular administrativo
          <input type="tel" name="phone" placeholder="Telefone de acesso" required autofocus>
        </label>

        <label>
          Informe sua senha
          <span class="password-field">
            <input type="password" name="password" placeholder="Senha administrativa" required>
            <button class="password-toggle" type="button" data-password-toggle aria-label="Mostrar senha">Ver</button>
          </span>
        </label>

        <a class="auth-forgot-link" href="index.html">Voltar para a página inicial</a>

        <button class="primary-button auth-submit" type="submit">Entrar como admin</button>

        <p class="admin-auth-note">Uso exclusivo da equipe do Studio MNunesnails.</p>
        <p class="editor-feedback" id="admin-login-feedback" role="status"></p>
      </form>
    </section>
  </main>

  <div class="toast" id="site-toast" role="status" aria-live="polite"></div>
  <script src="login.js"></script>
</body>
</html>
